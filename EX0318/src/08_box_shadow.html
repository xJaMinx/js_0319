<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        p{
            width: 150px;
            padding: 20px;
            background: #aaf;
            text-align: center;
            border-radius: 5px;
            box-shadow: 10px 10px 15px #333;

            /*
            box-shadow: 10px 10px 15px #333;
                        x좌표 y좌표 그림자크기 색
            */
        }

        h1{
            width: 150px;
            padding: 10px;
            background: #aaf;
            text-align: center;
            box-shadow: inset 5px -5px 15px 2px #555;
            /*              x좌표 y좌표 그림자크기 그림자두께 색상
            box-shadow: inset 5px -5px 15px 2px #555;
            */
        }

    </style>
</head>
<body>

    <p>내용</p>

    <h1>내용</h1>

</body>
</html>
