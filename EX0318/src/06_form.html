<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>



    </style>

</head>
<body>
<!-- 
    action : submit을 통해서 전송될 페이지 url
    method(전송방식) : get- 공개 post - 비공개
-->

    <form action="test.html" method="get">
        <p>
            입력상자 <input type="text"/>
        </p>
        <p>
            id <input type="text" size="10" name="myid"/>
            <br/>
            pwd <input type="password" size="50" name="mypwd"/>
        </p>
        <p>
            메일수신여부 <br/>
            <input type="radio" value="Y" name="receive"/>예 <br/>
            <input type="radio" value="N" name="receive"/>아니오
        </p>
        <p>
            파일 <input type="file"/>
        </p>
        <p>
            <select name="subject">
                <option value="html">HTML5</option>
                <option value="css">CSS</option>
                <option value="js">JavaScript</option>
            </select>
        </p>
        <p>
            <input type="submit" value="전송"/>
            <input type="reset" value="취소"/>
        </p>
    </form>

</body>
</html>
