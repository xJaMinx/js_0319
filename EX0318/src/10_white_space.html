<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .normal{
            white-space: normal;
        }

        .nowrap{
            white-space: nowrap;
        }

        .normal{
            white-space: pre;
        }

    </style>

</head>
<body>
    
    <p class="normal">
        공백문자의 처리를 위해 white-space를 사용한다
    </p>
    <p class="nowrap">
        자동 줄바꿈이 아닐때 nowrap을 통해서 한줄로 출력할 수 있다. 만일 웹브라우저를 넘어가는 너비라면 자동으로 스크롤을 생성한다
    </p>
    <p class="pre">
        for(int i = 0; i < 10; i++){
            System.outprintln( i );
        }
    </p>
    <p>
        <pre>
            for(int i = 0; i < 10; i++){
                System.outprintln( i );
            }
        </pre>
    </p>
</body>
</html>
