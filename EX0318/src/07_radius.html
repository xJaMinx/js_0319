<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        h1{
            width: 200px;
            margin: 50px auto;
            padding: 80px 0;
            text-align: center;
            background: #aaf;
            border-radius: 20px 30px 40px 50px;

            /* 
            border-radius:20px; -> 4각이 모두 적용 
            border-radius:20px 30px; -> 좌상 우하 , 우상 좌하
            border-radius:20px 30px 40px; -> 좌상 , 우상 좌하 , 우하
            border-radius:20px 30px 40px 50px; -> 좌상 부터 시계반향
            */
        }

    </style>
</head>
<body>

    <h1>내용</h1>

</body>
</html>
