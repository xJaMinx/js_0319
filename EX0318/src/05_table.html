<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/reset.css"/>
    <style>

        body{
            margin: 10px;
        }

        table{
            width: 900px;
            margin: 0 auto;
            background: #000;
            color: white;
        }

        caption{
            color: #000;
            margin-bottom: 10px;
        }

        th{
            background: #07f;
            padding: 15px;
            border-top: 1px solid #777;
            border-right: 1px solid #777;
            margin-bottom: 10px;
        }
        th:first-child{
            border-left: 1px solid #777;
        }

        td{
            color: #000;
            background-color:khaki;
            height: 100px;
            padding: 10px;
            border-right: 1px solid #777;
            border-bottom: 1px solid #777;
        }

        td.subTitle{
            text-align: center;
            font-weight: bold;
            border-left: 1px solid #777;
        }

        tr:first-child td:nth-child(1),
        tr:first-child td:nth-child(2),
        tr:first-child td:nth-child(3),
        tr:first-child td:nth-child(4),
        tr:first-child td:nth-child(5){
            border-top: 5px solid black;
            text-align: center;
        }




    </style>
</head>
<body>

    <table>
        <caption>
            <h1>업종별 모범거래기준 주요 내용 비교</h1>
        </caption>
        <colgroup>
            <col width="20%"/>
            <col width="20%"/>
            <col width="20%"/>
            <col width="20%"/>
            <col width="20%"/>
        </colgroup>
        <thead>
            <tr>
                <th>구분</th>
                <th>제빵(4월)</th>
                <th>피자(7월)</th>
                <th>치킨(7월)</th>
                <th>커피(11월)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td class="subTitle">영업지역</td>
                <td>500m</td>
                <td>1,500m</td>
                <td>800m</td>
                <td>500m</td>
            </tr>
            <tr>
                <td class="subTitle">광고</td>
                <td>관련내용 없음<br>(분쟁없음)</td>
                <td>총 광고비 사전동의<br>광고내역 송부 등</td>
                <td>총 광고비 사전동의<br>광고내역 송부 등</td>
                <td>관련내용 없음<br>(분쟁없음)</td>
            </tr>
            <tr>
                <td class="subTitle">대금지급</td>
                <td>관련내용 없음<br>(분쟁없음)</td>
                <td>관련내용 없음<br>(분쟁없음)</td>
                <td>관련내용 없음</td>
                <td>월 1~2회 정산<br>정산기한 최소 7일 보장</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
