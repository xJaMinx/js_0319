<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블록 요소와 인라인 요소</title>
</head>
<body>
    안녕하세요
    <!-- p태그나 h태그와 같이 브라우저의 너비를 혼자서 모두 차지하는 태그를 '블럭요소'라고 한다-->
    <p>단락을 정의하는 <b>p태그는</b> <strong>블록</strong>요소</p>

    <p>
        <i>첫번째 줄</i> <br/>
        <em>두번째 줄</em> <br/>
        세번째 줄
    </p>
    
    <!-- 수평선 태그 hr : 블록 요소 -->
    <hr/>

    <p> <!-- target="_blank" 새 탭으로 열기 -->
        <a href="01_init.html" target="_blank">링크를 연결하는 a태그</a>
        <a href="https://www.naver.com">네이버</a>
        <!-- 연결할 곳이 정해지지 않은 a태그에는
             임시링크 #을 넣어둔다  -->
        <a href="#">인라인 요소인 a태그</a>
    </p>

</body>
</html>
