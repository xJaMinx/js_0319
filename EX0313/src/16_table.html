<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블</title>
</head>
<body>
    <p>표 만들기 (1행 1열)</p>

    <table border="1">
        <tr>
            <td>1행 1열</td>
        </tr>
    </table>

    <hr>

    <p>1행 2열</p>
    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
    </table>

    <hr>

    <p>2행 1열</p>
    <table border="1">
        <tr>
            <td>1행1열</td>
        </tr>
        <tr>
            <td>2행1열</td>
        </tr>
    </table>
    
    <hr>
    
    <p>2행 2열</p>
    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
        <tr>
            <td>2행 1열</td>
            <td>2행 2열</td>
        </tr>
    </table>

</body>
</html>
