<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{margin: 0; padding: 0;}

        #header{
            margin: 10px auto;
            width: 500px;
            border: 5px solid #caa;
            background: #fdd;
            overflow: hidden;
        }

        h1{
            text-align: center;
        }

        .c1{
            width: 200px;
            padding: 15px;
            background: #dda;
            float: left;
        }

        .c2{
            width: 200px;
            padding: 15px;
            background: #da7;
            float: right;
        }
        
        /* 
            .c1, .c2가 float을 통해서 '부유'한 형태가 됐다면 부모(header)가 자식의 높이를 인식하도록
            float의 해제가 필요하다
            overflow:hidden으로 float을 해제한다
        */

    </style>
</head>
<body>

    <div id="header">
        <h1>float 연습</h1>

        <div class="c1">
            내용 left
        </div>

        <div class="c2">
            내용 right
        </div>
    </div>

</body>
</html>
