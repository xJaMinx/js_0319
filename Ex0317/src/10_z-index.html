<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0; padding: 0;
        }

        p{
            border: 1px solid black;
            width: 100px;
            padding: 40px 0;
            text-align: center;
            position: absolute;
        }


        /* z-index : 겹쳐져 있는 요소들의 순서를 변경 */
        /* z-index 값이 클 수로고 위에 표시된다 */
        .box1{
            background: yellow;
            left: 100px; top : 100px;
            z-index: 3;
        }

        .box2{
            background: orange;
            left: 120px; top:120px;
            z-index: 2;
        }

        .box3{
            background: teal;
            left: 140px; top : 140px;
        }

    </style>
</head>
<body>

    <p class="box1">박스1</p>
    <p class="box2">박스2</p>
    <p class="box3">박스3</p>

</body>
</html>
