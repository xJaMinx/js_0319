    <style>

        *{margin: 0; padding: 0;}

        li{
            list-style: none;
        }

        a{
            color: white;
            text-decoration: none;
            display: block;
        }

        #menu{
            width: 350px;
            background: black;
            overflow: hidden;
            margin: 20px auto;
            
        }

        ul#menu li{
            float: left;
            position: relative;
            background: black;
        }

        ul#menu li a{

        }

        ul#submenu_list{
            position: absolute;
            background: black;
            display: none;
            left: 20px;
            top: 20px;
        }


        ul#menu li:hover ul#submenu_list li{
            display: block;
        }
        


    </style>
</head>
