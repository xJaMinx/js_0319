<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{margin: 0; padding: 0;}

        li{
            list-style: none;
        }

        #box{
            width: 150px;
            margin: 50px auto;
            border: 1px solid gray;
            padding: 10px;
            background: #eee;
        }
        
        a{
            display: block;
            text-decoration: none;
            color: black;
            font-weight: bold;
            text-align: center;
            margin: 2px;
            padding: 10px 0;
        }
        a:hover{
            background: black;
            color: #fff;
        }

        

    </style>
</head>
<body>

    <div id="box">
        <ul>
            <li><a href="#">COMPANY</a></li>
            <li><a href="#">PRODUCT</a></li>
            <li><a href="#">SERVICE</a></li>
            <li><a href="#">COMMUNITY</a></li>
        </ul>
    </div>

</body>
</html>
