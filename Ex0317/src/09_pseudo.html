<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        li:first-child{color: #f00;}
        li:last-child{color: #00f;}

        li:nth-child(odd){
            color: pink;
        }

        li:nth-child(even){
            color: green;
        }

        li:nth-child(4n){
            background: yellow;
        }

        li:nth-child(6){
            background: aqua;
        }
    </style>
</head>
<body>

    <ul>
        <li>A</li>
        <li>B</li>
        <li>C</li>
        <li>D</li>
        <li>E</li>
        <li>F</li>
        <li>G</li>
        <li>H</li>
    </ul>

    <ul>
        <li>A</li>
        <li>B</li>
        <li>C</li>
        <li>D</li>
    </ul>

</body>
</html>
