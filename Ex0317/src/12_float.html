<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{margin: 0; padding: 0;}

        #wrap{
            width: 430px;
            margin: 0 auto;
            background: black;
            border: 5px solid #f00;
        }

        #header{
            background: #09f;
            margin-bottom: 10px;
            padding: 10px 0;
            text-align: center;
            color: #fff;
        }
        
        #content{
            background: #ccc;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #left{
            float: left;
            width: 180px;
            height: 100px;
            background: #fcf;
            padding: 10px;
        }
        #right{
            float: left;
            width: 180px;
            height: 100px;
            background: #fff;
            padding: 10px;
            margin-left: 30px;
        }

        #footer{
            background: #33f;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }

    </style>
</head>
<body>

    <div id="wrap">
        <div id="header">
            나는 header
        </div>

        <div id="content">
            <div id="left">
                왼쪽
            </div>

            <div id="right">
                오른쪽
            </div>
        </div>

        <div id="footer">
            나는 Footer
        </div>

    </div>

</body>
</html>
