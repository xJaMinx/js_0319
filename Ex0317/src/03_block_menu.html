<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{margin: 0; padding: 0;}
        li{
            list-style: none;
        }
        ul{
            width: 130px;
        }
        #box{
            width: 150px;
            margin: 0 auto;
        }

        a{
            text-decoration: none;
            background: #f30;
            padding: 5px;
            display: block;
            margin: 3px 0;
            color: #fff;
            font-weight: bold;
        }

        
        /* a태그에 마우스를 얹었을 때 동작하는 css */
        a:hover{
            background: #0c0;
            color: #ff0;
        }
        
        /* 클릭시 분홍색으로 변경 */
        /* active 는 hover 보다 아래에 있어야 작동을 함 */
        a:active{
            color: pink;
        }

    </style>
</head>
<body>

    <div id="box">
        <h1>Menu</h1>

        <ul>
            <li><a href="#">COMPANY</a></li>
            <li><a href="#">PRODUCT</a></li>
            <li><a href="#">SERVICE</a></li>
            <li><a href="#">COMMUNITY</a></li>
        </ul>
    </div>

</body>
</html>
