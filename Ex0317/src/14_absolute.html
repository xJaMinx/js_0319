<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{margin: 0; padding: 0;}

        .box{
            width: 250px;
            border: 1px solid red;
            margin: 70px;
            position: relative;
        }

        p{
            width: 130px;
            height: 80px;
            padding: 10px;
            color: white;
        }

        .red{
            background: red;
        }

        /*
        .blue에 left, top 속성을 추가하니
        .box를 부모로 인지하지 못하고 영역 밖으로 벗어남
        .blue의 부모인 .box가 postion:relatiove; 속성을 통해 여전히 .blue의 부모임을 명시할 수 있다. 
        */
        .blue{
            background: blue;
            position: absolute;
            left: 50px;
            top: 30px;;
        }
        .green{
            background: green;
        }



    </style>
</head>
<body>

    <div class="box">
        <p class="red">position1</p>
        <p class="blue">position2</p>
        <p class="green">position3</p>
    </div>

</body>
</html>
