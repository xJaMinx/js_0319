<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>padding 여백속성</title>
    <style>

        p{
            border: 5px solid red;
            background-color: yellow;
        }
        
        /* 상하좌우 */
        .box1{
            padding: 20px;
        }

        /* 상하, 좌우 */
        .box2{
            padding: 20px 50px;
        }

        /* 상, 좌우, 하 */
        .box3{
            padding: 10px 50px 30px;
        }

        /* 상, 우, 하, 좌 */
        .box4{
            padding: 20px 30px 50px 70px;
        }

    </style>
</head>
<body>
    
    <p class="box1">padding(안쪽여백) 연습</p>
    <p class="box2">padding(안쪽여백) 연습</p>
    <p class="box3">padding(안쪽여백) 연습</p>
    <p class="box4">padding(안쪽여백) 연습</p>

</body>
</html>
