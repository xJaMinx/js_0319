<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            border-width: 20px;
            border-color: #00f;
        }
        .box1{
            border-style: none;
        }
        .box2{
            border-style: hidden;
        }
        .box3{
            border-style: dotted;
        }
        .box4{
            border-style: dashed;
        }
        .box5{
            border-style: solid;
        }
        .box6{
            border-style: double;
        }
        .box7{
            border-style : groove;
        }
        .box8{
            border-style: ridge;
        }
        .box9{
            border-style: inset;
        }
        .box10{
            border-style: outset;
        }
        .div1{
            border: #00f 20px solid;
            width: 200px; height: 100px;
        }
        .div2{
            border-bottom: 10px solid #f00;
        }
        /* 상우하좌등 여러방향에 각각 속성을 적용하려면 width, style등의 속성값에 border- 를 꼭 넣어줘야한다 */
        .div3{
            border-width: 10px 20px 30px 40px;
            border-style: solid;
            border-color: #00f;
        }

    </style>
</head>
<body>
    
    <p class="box1">box테두리 연습</p>
    <p class="box2">box테두리 연습</p>
    <p class="box3">box테두리 연습</p>
    <p class="box4">box테두리 연습</p>
    <p class="box5">box테두리 연습</p>
    <p class="box6">box테두리 연습</p>
    <p class="box7">box테두리 연습</p>
    <p class="box8">box테두리 연습</p>
    <p class="box9">box테두리 연습</p>
    <p class="box10">box테두리 연습</p>

    <div class="div1">
        div의 테두리1
    </div>

    <div class="div2">
        div의 테두리2
    </div>

    <div class="div3">
        div의 테두리3
    </div>

</body>
</html>
