<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            padding: 0; margin: 0;
        }

        div{
            width: 800px;
            margin: 50px auto;
            border: 1px solid black;
            border-radius: 5px;
        }

        h1{
            margin: 20px 0;
            font: bold 24px "굴림";
            text-align: center;
        }

        dl{
            margin: 10px 30px;
        }

        dt{
            background: #aaf;
            font: bold 16px "굴림";
            border: 1px black solid;
            border-radius: 3px 3px 0 0;
            padding: 5px 20px;
        }
        dd{
            border-style: none solid dashed solid;
            border-width: 1px;
            border-radius: 0px 0px 3px 3px;
            margin-bottom: 20px;
            padding: 5px 20px;
        }



    </style>
</head>
<body>

    <div>
        <h1>한국의 속담을 완성하세요!</h1>
        <dl>
            <dt>1. 까마귀 날자 배 떨어진다.</dt>
            <dd>어떤 행동을 하거나 무엇인가를 시작하면 그에 따른 결과가 따라온다</dd>

            <dt>2. 발 없는 말이 천리간다</dt>
            <dd>정확한 사실과는 다르지만, 비록 허위라도 널리 떠져서 많은 사람이 믿게 되는 일이 있다.</dd>

            <dt>3. 오늘은 나비가 되어라, 내일은 병아리가 되어라</dt>
            <dd>어떤 때는 날쌔고, 어떤때는 조용하고 신중하게 행동하리라</dd>

            <dt>4. 바늘 도둑이 소도둑 된다</dt>
            <dd>작은 범죄를 저지르는 사람은 점점 큰 범죄를 저지르는 사람이 될 수 있다.</dd>
        </dl>
    </div>

</body>
</html>
