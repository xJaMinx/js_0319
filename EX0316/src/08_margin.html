<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>margin(바깥쪽 여백)</title>
    <style>
        div{
            border :5px solid red;
        }
        .box1{
            margin: 20px; /*상하좌우*/
        }
        .box2{
            margin: 20px 50px ; /* 상하, 좌우 */
        }
        .box3{
            margin: 20px 50px 30px; /* 상, 좌우 , 하 */
        }
        .box4{
            margin: 20px 30px 50px 70px; /* 상, 우, 하, 좌 */
        }

    </style>
</head>
<body>
    
    <div class="box1">바깥쪽 여백 연습</div>
    <div class="box2">바깥쪽 여백 연습</div>
    <div class="box3">바깥쪽 여백 연습</div>
    <div class="box4">바깥쪽 여백 연습</div>

</body>
</html>
