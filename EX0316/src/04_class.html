<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.box h2{
            color: #f00;
        }
        span{
            color: #00f;
        }
        h2 span.span_green{
            color: #0f0;
        }
    </style>
</head>
<body>
  
    <div class="box">
        <h2><span>클래스</span> 연습</h2>
        <div class="box">
            <h2><span>클래스</span> 연습2</h2>
        </div>
    </div>

    <h2><span class="span_green">클래스</span> 연습3</h2>

</body>
</html>
