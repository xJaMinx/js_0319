<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <caption>데이터 데이블</caption>

        <tr>
            <td>구분</td>
            <td>태블릿pc</td>
            <td>스마트폰</td>
        </tr>
        <tr>
            <td>상반기 판매량</td>
            <td>2만대</td>
            <td>5만대</td>
        </tr>
        <tr>
            <td>하반기 판매량</td>
            <td>3만대</td>
            <td>11만대</td>
        </tr>
        <tr>
            <td>총 판매량</td>
            <td>5만대</td>
            <td>16만대</td>
        </tr>
    </table>

    <hr/>

    <table border="1">
        <caption>데이터 테이블</caption>
    
        <!-- 시맨틱 태그 : 포함된 컨텐츠의 특정 의미를 정의하고 목적을 갖고 만들어지는 태그 -->
        <thead>
            <tr>
                <td>구분</td>
                <td>태블릿pc</td>
                <td>스마트폰</td>
            </tr>
        </thead>

        <tfoot>
            <tr>
                <td>총 판매량</td>
                <td>5만대</td>
                <td>16만대</td>
            </tr>
        </tfoot>

        <tbody>
            <tr>
                <td>상반기 판매량</td>
                <td>2만대</td>
                <td>5만대</td>
            </tr>
            <tr>
                <td>하반기 판매량</td>
                <td>3만대</td>
                <td>11만대</td>
            </tr>
        </tbody>
        
    </table>

</body>
</html>
