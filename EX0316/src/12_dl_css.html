<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>

        *{
            padding: 0;
            margin: 0;
        }

        dl{
            width: 650px;
            border: 5px double gray;
            margin: 0 auto;
        }

        dt{
            padding: 15px 0;
            text-align: center;
            background-color: #aaf;
            border-bottom: 10px solid blue;
            letter-spacing: 10px;
        }

        dd{
            padding: 10px 0;
            background-color: yellow;
            text-indent: 15px;
        }

        .line{
            border-bottom: 5px dotted black;
        }

    </style>
</head>
<body>
    
    <dl>
        <dt>dl디자인 연습</dt>
        <dd class="line">스타일 시트를 연습하자</dd>
        <dd>영차영차</dd>
    </dl>

</body>
</html>
