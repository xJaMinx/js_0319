<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .m1{
            list-style: none;
        }
        .m2{
            list-style: disc;
        }
        .m3{
            list-style: circle;
        }
        .m4{
            list-style: square;
        }
        .m5{
            list-style: upper-alpha;
        }
        .m6{
            list-style: lower-alpha;
        }
        .m7{
            list-style: upper-roman;
        }
        .m8{
            list-style: lower-roman;
        }

    </style>
</head>
<body>

    <ul>
        <li class="m1">메뉴</li>
        <li class="m2">메뉴</li>
        <li class="m3">메뉴</li>
        <li class="m4">메뉴</li>
        <li class="m5">메뉴</li>
        <li class="m6">메뉴</li>
        <li class="m7">메뉴</li>
        <li class="m8">메뉴</li>
    </ul>

</body>
</html>
