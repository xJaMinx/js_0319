<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
        }

        .main{
            width: 800px;
            margin: 30px auto;
            border: 2px gray solid;
            padding: 15px;
        }
        
        h1{
            text-align: center;
            font: bold 30px sans-serif;
            margin-bottom:15px;
        }

        .title{
            text-align: center;
            background-color: #aaf;
            padding: 10px;
            font: bold 15px "돋움";
            border-bottom: 3px blue solid;
            letter-spacing: 2px;
            margin: 15px 0 10px 0;
        }

        .content{
            padding: 10px 0;
            text-indent: 20px;
            border-bottom: 2px dotted gray;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>
    
    <div class="main">
        <h1>한국의 속담</h1>
        <dl>
            <dt class="title">1. 까마귀 날자 배 떨어진다</dt>
            <dd class="content">어떤 행동을 하거나 무엇인가를 시작하면 그에 따른 결과가 따라온다.</dd>
        </dl>

        <dl>
            <dt class="title">2. 발 없는 말이 천리간다</dt>
            <dd class="content">정확한 사실과는 다르지만, 비록 허위라도 널리 퍼져서 많은 사람이 믿게 되는 일이 있다.</dd>
        </dl>

        <dl>
            <dt class="title">3. 오늘은 나비가 되어라, 내일은 병아리가 되어라</dt>
            <dd class="content">어떤 때는 날쌔고 즐겁게, 어떤 때는 조용하고 신중하게 행동하라.</dd>
        </dl>

        <dl>
            <dt class="title">4. 바늘 도둑이 소 도둑 된다.</dt>
            <dd class="content">작은 범죄를 저지르는 사람은 점점 큰 범죄를 저지르는 사람이 될 수 있다.</dd>
        </dl>

    </div>

</body>
</html>
